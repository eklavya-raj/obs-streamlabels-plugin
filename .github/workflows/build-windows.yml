name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        vcpkg install curl:x64-windows cjson:x64-windows libwebsockets:x64-windows
        
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
        
    - name: Build
      run: |
        cd build
        cmake --build . --config Release
        
    - name: Create package
      run: |
        mkdir obs-streamlabels-plugin
        copy build\Release\obs-streamlabels.dll obs-streamlabels-plugin\
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: obs-streamlabels-plugin-windows
        path: obs-streamlabels-plugin/
        retention-days: 30
