name: Build macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake cjson libwebsockets ffmpeg jansson mbedtls

      - name: Clone OBS Studio
        run: |
          cd /tmp
          git clone --recursive --depth 1 --branch 30.0.0 https://github.com/obsproject/obs-studio.git

      - name: Fix OBS CMake for CI
        run: |
          # Patch the problematic cmake file to bypass SDK version check on CI
          sed -i '' 's/string(REGEX MATCH "^([0-9]+)" MACOS_MAJOR_VERSION "${MACOS_SDK_VERSION}")/set(MACOS_MAJOR_VERSION 14)/' /tmp/obs-studio/cmake/macos/compilerconfig.cmake || true
          sed -i '' 's/if(NOT MACOS_MAJOR_VERSION OR MACOS_MAJOR_VERSION LESS 13)/if(FALSE)/' /tmp/obs-studio/cmake/macos/compilerconfig.cmake || true

      - name: Build OBS Studio
        env:
          MACOSX_DEPLOYMENT_TARGET: 13.0
        run: |
          cd /tmp/obs-studio
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_UI=OFF -DENABLE_SCRIPTING=OFF -DENABLE_BROWSER=OFF ..
          make -j$(sysctl -n hw.ncpu) libobs obs-frontend-api

      - name: Build plugin
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/tmp/obs-studio/build ..
          make -j$(sysctl -n hw.ncpu)

      - name: Create package
        run: |
          cd build
          mkdir -p obs-streamlabels-plugin
          cp libobs-streamlabels.dylib obs-streamlabels-plugin/
          cp -r ../src/*.h obs-streamlabels-plugin/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-streamlabels-plugin-macos
          path: build/obs-streamlabels-plugin/
          retention-days: 30
