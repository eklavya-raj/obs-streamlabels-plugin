name: Build Linux

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libobs-dev libcurl4-openssl-dev libcjson-dev libwebsockets-dev
        
    - name: Build plugin
      run: |
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        
    - name: Create package
      run: |
        cd build
        mkdir -p obs-streamlabels-plugin
        cp libobs-streamlabels.so obs-streamlabels-plugin/
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: obs-streamlabels-plugin-linux
        path: build/obs-streamlabels-plugin/
        retention-days: 30
